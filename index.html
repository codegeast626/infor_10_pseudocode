<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Detective</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Orbitron:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
        :root { --vh: 1vh; }
        body { font-family: 'DM Sans', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        @keyframes glow { 0%,100%{text-shadow:0 0 10px #00f7ff,0 0 20px #00f7ff,0 0 40px #7c3aed}50%{text-shadow:0 0 20px #00f7ff,0 0 40px #00f7ff,0 0 80px #7c3aed} }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        @keyframes pulse-border { 0%,100%{border-color:#00f7ff}50%{border-color:#7c3aed} }
        @keyframes glitch { 0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,2px)}100%{transform:translate(0)} }
        @keyframes dataflow { 0%{background-position:0% 50%}100%{background-position:200% 50%} }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)} }

        .glow-text { animation: glow 2s ease-in-out infinite; }
        .float-anim { animation: float 3s ease-in-out infinite; }
        .pulse-border { animation: pulse-border 2s ease-in-out infinite; }
        .glitch:hover { animation: glitch 0.3s ease-in-out; }
        .data-flow { background: linear-gradient(90deg,#00f7ff,#7c3aed,#00f7ff); background-size:200%;animation:dataflow 3s linear infinite; }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        .neon-btn { background:linear-gradient(135deg,#1e1b4b,#312e81); border:1px solid #00f7ff; box-shadow:0 0 10px rgba(0,247,255,0.3),inset 0 0 10px rgba(0,247,255,0.1); transition:all 0.3s; cursor:pointer; }
        .neon-btn:hover { box-shadow:0 0 20px rgba(0,247,255,0.6),inset 0 0 20px rgba(0,247,255,0.2);transform:translateY(-2px); }

        .algo-block { cursor:pointer;user-select:none;transition:all 0.2s; }
        .algo-block:active { transform:scale(1.05); }
        .algo-block.dragging { opacity:0.5; }

        .drop-zone { border:2px dashed #4c1d95;min-height:50px;transition:all 0.2s; }
        .drop-zone.drag-over { border-color:#00f7ff;background:rgba(0,247,255,0.1); }

        .panel { background:rgba(15,10,40,0.85);border:1px solid rgba(124,58,237,0.3);backdrop-filter:blur(10px); }

        .progress-bar { height:6px;border-radius:3px;overflow:hidden; }
        .progress-fill { height:100%;background:linear-gradient(90deg,#00f7ff,#7c3aed);transition:width 0.5s; }

        .screen { display:none; }
        .screen.active { display:flex; }

        .level-card { cursor:pointer; }
        .level-card:hover { border-color: #00f7ff; }
    </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>

     </svg>

    </div>

       <div id="progress-fill" class="progress-fill" style="width:0%"></div>

     </div>

      <div id="badges-container" class="flex flex-wrap gap-1"><span class="text-lg opacity-30">🔒</span><span class="text-lg opacity-30">🔒</span><span class="text-lg opacity-30">🔒</span><span class="text-lg opacity-30">🔒</span><span class="text-lg opacity-30">🔒</span>
      </div>
     </div>

   <div class="flex items-center justify-center gap-3 px-4 py-3 bg-black/60 border-t border-purple-900/50"><button data-template-id="btn-run" class="canva-button neon-btn font-orbitron text-sm px-6 py-2 rounded-lg" onclick="runAlgorithm()"></button> <button data-template-id="btn-retry" class="canva-button neon-btn font-orbitron text-sm px-6 py-2 rounded-lg" onclick="retryLevel()"></button> <button data-template-id="btn-hint" class="canva-button neon-btn font-orbitron text-sm px-6 py-2 rounded-lg" onclick="showHint()"></button> <button id="btn-next" data-template-id="btn-next" class="canva-button neon-btn font-orbitron text-sm px-6 py-2 rounded-lg hidden" onclick="nextLevel()"></button>
   </div>

  <div id="popup-feedback" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70">

    <div id="popup-icon" class="text-5xl mb-3"></div>
    <h3 id="popup-title" class="font-orbitron text-xl font-bold mb-2"></h3>
    <p id="popup-msg" class="text-gray-300 text-sm mb-4"></p><button class="neon-btn font-orbitron text-sm text-cyan-300 px-6 py-2 rounded-lg" onclick="closePopup()">OK</button>
   </div>

  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        if (window.lucide) lucide.createIcons();

        let currentLevel = 0;
        let score = 0;
        let timer = 60;
        let timerInterval = null;
        let completedLevels = [];
        const badgeEmojis = ['🏅','🎖️','💎','🏆','👑'];

        const levels = [
            {
                title: 'Level 1: Input Data Murid',
                desc: 'Kasus: Data nilai 5 murid perlu dimasukkan ke dalam variabel array. Susun algoritma input data yang benar!',
                instructions: ['Deklarasi variabel array','Gunakan perulangan FOR','Input nilai satu per satu','Simpan ke array'],
                target: 'Membuat algoritma input 5 data nilai murid ke array',
                blocks: ['DEKLARASI nilai[5]','FOR i = 1 TO 5','INPUT nilai[i]','NEXT i','OUTPUT "Data tersimpan"'],
                solution: [0,1,2,3,4],
                time: 60
            },
            {
                title: 'Level 2: Nilai Tertinggi & Terendah',
                desc: 'Kasus: Dari data yang sudah diinput, temukan nilai tertinggi dan terendah. Gunakan algoritma pencarian!',
                instructions: ['Set max dan min awal','Bandingkan setiap elemen','Update max/min jika ditemukan','Tampilkan hasil'],
                target: 'Menemukan nilai max dan min dari array',
                blocks: ['max = nilai[1]; min = nilai[1]','FOR i = 2 TO 5','IF nilai[i] > max THEN max = nilai[i]','IF nilai[i] < min THEN min = nilai[i]','NEXT i','OUTPUT max, min'],
                solution: [0,1,2,3,4,5],
                time: 75
            },
            {
                title: 'Level 3: Menghitung Rata-Rata',
                desc: 'Kasus: Hitung rata-rata nilai dari semua murid. Gunakan akumulator dan pembagian!',
                instructions: ['Inisialisasi total = 0','Jumlahkan semua nilai','Bagi dengan jumlah data','Tampilkan rata-rata'],
                target: 'Menghitung rata-rata dari 5 nilai murid',
                blocks: ['total = 0','FOR i = 1 TO 5','total = total + nilai[i]','NEXT i','rata = total / 5','OUTPUT rata'],
                solution: [0,1,2,3,4,5],
                time: 60
            },
            {
                title: 'Level 4: Status Kelulusan',
                desc: 'Kasus: Tentukan status lulus/tidak lulus berdasarkan rata-rata nilai. KKM = 75.',
                instructions: ['Hitung rata-rata','Gunakan percabangan IF-ELSE','Tentukan status kelulusan','Tampilkan hasil'],
                target: 'Menentukan lulus (rata≥75) atau tidak lulus',
                blocks: ['rata = total / 5','IF rata >= 75 THEN','OUTPUT "LULUS"','ELSE','OUTPUT "TIDAK LULUS"','ENDIF'],
                solution: [0,1,2,3,4,5],
                time: 75
            },
            {
                title: 'Level 5 BOSS: Analisis Data Kompleks',
                desc: 'Kasus: Buat laporan lengkap — input data, cari max/min, hitung rata-rata, dan tentukan status setiap murid!',
                instructions: ['Input semua data','Cari max dan min','Hitung rata-rata','Cek status tiap murid','Tampilkan laporan'],
                target: 'Analisis data lengkap dengan semua algoritma sebelumnya',
                blocks: ['FOR i = 1 TO 5: INPUT nilai[i]: NEXT','max=nilai[1]; min=nilai[1]','FOR i=2 TO 5: cek max/min: NEXT','total=0; FOR i=1 TO 5: total+=nilai[i]: NEXT','rata = total/5','FOR i=1 TO 5: IF nilai[i]>=75 THEN "Lulus" ELSE "Tidak": NEXT','OUTPUT laporan lengkap'],
                solution: [0,1,2,3,4,5,6],
                time: 120
            }
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() { showScreen('screen-levels'); }
        function backToMenu() { showScreen('screen-opening'); }
        function exitGame() { showPopup('👋','Sampai Jumpa!','Terima kasih telah bermain Algorithm Detective!'); }
        function showGuide() { document.getElementById('modal-guide').classList.remove('hidden'); }
        function closeGuide() { document.getElementById('modal-guide').classList.add('hidden'); }

        function selectLevel(idx) {
            currentLevel = idx;
            loadLevel();
            showScreen('screen-gameplay');
        }

        function loadLevel() {
            const lvl = levels[currentLevel];
            document.getElementById('level-label').textContent = 'Level ' + (currentLevel + 1);
            document.getElementById('case-description').textContent = lvl.desc;
            document.getElementById('target-text').textContent = lvl.target;

            const instrList = document.getElementById('instructions-list');
            instrList.innerHTML = '';
            lvl.instructions.forEach(i => { const li = document.createElement('li'); li.textContent = i; instrList.appendChild(li); });

            const blocksContainer = document.getElementById('available-blocks');
            blocksContainer.innerHTML = '';
            const shuffled = [...lvl.blocks].sort(() => Math.random() - 0.5);
            shuffled.forEach(block => {
                const el = document.createElement('div');
                el.className = 'algo-block px-3 py-2 rounded-lg text-xs font-mono border pulse-border';
                el.style.background = 'rgba(30,27,75,0.9)';
                el.style.color = '#00f7ff';
                el.textContent = block;
                el.draggable = true;
                el.dataset.blockIdx = lvl.blocks.indexOf(block);
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                el.addEventListener('click', handleBlockClick);
                blocksContainer.appendChild(el);
            });

            document.getElementById('solution-zone').innerHTML = '';
            document.getElementById('btn-next').classList.add('hidden');

            timer = lvl.time;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer--;
                updateTimerDisplay();
                if (timer <= 0) { clearInterval(timerInterval); showPopup('⏰','Waktu Habis!','Coba lagi untuk menyelesaikan misi ini.'); }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = timer;
            document.getElementById('timer-big').textContent = timer;
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').textContent = score;
            document.getElementById('score-big').textContent = score;
            document.getElementById('progress-fill').style.width = (completedLevels.length / 5 * 100) + '%';
            document.getElementById('progress-text').textContent = completedLevels.length + '/5';
        }

        // Drag and drop
        let draggedEl = null;
        function handleDragStart(e) { draggedEl = e.target; e.target.classList.add('dragging'); }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedEl = null; }

        function handleBlockClick(e) {
            const block = e.currentTarget;
            const clone = block.cloneNode(true);
            clone.draggable = false;
            clone.style.cursor = 'pointer';
            clone.removeEventListener('click', handleBlockClick);
            clone.addEventListener('click', function() { this.remove(); });
            document.getElementById('solution-zone').appendChild(clone);
            block.remove();
        }

        const solutionZone = document.getElementById('solution-zone');
        solutionZone.addEventListener('dragover', e => { e.preventDefault(); solutionZone.classList.add('drag-over'); });
        solutionZone.addEventListener('dragleave', () => solutionZone.classList.remove('drag-over'));
        solutionZone.addEventListener('drop', e => {
            e.preventDefault();
            solutionZone.classList.remove('drag-over');
            if (draggedEl) {
                const clone = draggedEl.cloneNode(true);
                clone.draggable = false;
                clone.style.cursor = 'pointer';
                clone.addEventListener('click', function() { this.remove(); });
                solutionZone.appendChild(clone);
                draggedEl.remove();
            }
        });

        function runAlgorithm() {
            const lvl = levels[currentLevel];
            const placed = [...solutionZone.querySelectorAll('.algo-block')];
            const placedIdxs = placed.map(el => parseInt(el.dataset.blockIdx));

            if (placedIdxs.length !== lvl.solution.length) {
                showPopup('❌','Kesalahan Logika','Jumlah blok belum sesuai. Periksa kembali algoritma kamu!');
                return;
            }

            if (JSON.stringify(placedIdxs) === JSON.stringify(lvl.solution)) {
                clearInterval(timerInterval);
                const bonus = Math.max(0, timer) * 2;
                score += 100 + bonus;
                if (!completedLevels.includes(currentLevel)) completedLevels.push(currentLevel);
                updateScoreDisplay();
                updateBadges();
                document.getElementById('btn-next').classList.remove('hidden');
                showPopup('✅','Algoritma Benar!', '+' + (100 + bonus) + ' poin! Kamu berhasil menyelesaikan misi ini.');
                document.getElementById('lp-' + currentLevel).style.width = '100%';
            } else {
                showPopup('❌','Kesalahan Logika','Urutan blok belum benar. Coba susun ulang algoritma!');
            }
        }

        function retryLevel() { loadLevel(); }

        function showHint() {
            const lvl = levels[currentLevel];
            showPopup('💡','Petunjuk','Langkah pertama: "' + lvl.blocks[lvl.solution[0]] + '"');
        }

        function nextLevel() {
            if (currentLevel < 4) { currentLevel++; loadLevel(); }
            else { showPopup('🎉','Selamat!','Kamu telah menyelesaikan semua level! Kamu adalah Algorithm Detective sejati!'); }
        }

        function updateBadges() {
            const container = document.getElementById('badges-container');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const span = document.createElement('span');
                span.className = 'text-lg';
                span.textContent = completedLevels.includes(i) ? badgeEmojis[i] : '🔒';
                if (!completedLevels.includes(i)) span.classList.add('opacity-30');
                container.appendChild(span);
            }
        }

        function showPopup(icon, title, msg) {
            document.getElementById('popup-icon').textContent = icon;
            document.getElementById('popup-title').textContent = title;
            document.getElementById('popup-title').className = 'font-orbitron text-xl font-bold mb-2 ' + (icon === '✅' ? 'text-green-400' : icon === '❌' ? 'text-red-400' : 'text-cyan-300');
            document.getElementById('popup-msg').textContent = msg;
            document.getElementById('popup-feedback').classList.remove('hidden');
        }

        function closePopup() { document.getElementById('popup-feedback').classList.add('hidden'); }
    </script>
